<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fynix Wallet Dashboard</title>
  <link rel="stylesheet" href="./assets/css/wallet-style.css" />
  <link rel="stylesheet" href="./assets/css/custom-buttons.css" />
</head>
<body>
  <div class="container">
    <h1>Wallet Dashboard</h1>

    <!-- Wallet Balance Section -->
    <div class="card" id="wallet-balance">
      <h2>Wallet Balance</h2>
      <span id="balance-amount">--</span>
    </div>

    <!-- Buttons fixed on bottom right -->
    <div class="fixed-action-btn">
      <button id="create-wallet-btn" class="btn-create">Create Wallet</button>
      <button id="login-btn" class="btn-login">Login</button>
    </div>

    <!-- Modal -->
    <div id="walletModal" class="fynix-modal">
      <div class="fynix-modal-content">
        <span id="closeModal" class="fynix-close">&times;</span>
        <h2>Create New Wallet</h2>

        <form id="walletForm">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="Your email" />

          <label for="password">Password</label>
          <input type="password" id="password" name="password" required placeholder="Set a password" />

          <button type="submit" class="btn-register">Register</button>
        </form>

        <div id="formMessage"></div>
      </div>
    </div>
     <!-- Login Modal -->
<div id="loginModal" class="fynix-modal">
  <div class="fynix-modal-content">
    <span id="closeLoginModal" class="close">&times;</span>
    <h2>Login</h2>
    <form id="loginForm">
      <label for="loginEmail">Email</label>
      <input id="loginEmail" name="email" type="email" required placeholder="Enter your email" />
      <label for="loginPassword">Password</label>
      <input id="loginPassword" name="password" type="password" required placeholder="Enter your password" />
      <button type="submit" class="btn-login-modal">Login</button>
    </form>
    <p id="loginFormMessage"></p>
  </div>
</div>

    <!-- Action Buttons (different style) -->
    <div class="actions card" id="action-buttons" style="margin-top: 20px;">
      <button id="deposit-btn" class="btn-deposit">Deposit</button>
      <button id="send-btn" class="btn-action">Send</button>
      <button id="receive-btn" class="btn-action">Receive</button>
    </div>

    <!-- Transaction History -->
    <div class="card" id="transactions" style="margin-top: 20px;">
      <h3>Recent Transactions</h3>
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Type</th>
            <th>Amount</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="transaction-list">
          <!-- Dynamic rows here -->
        </tbody>
      </table>
    </div>
  </div>

  <script src="./assets/js/wallet-scripts.js"></script>
</body>
</html>
